version: '3.8'

services:
  # Single container running both Gateway + Worker
  obsidian-panel:
    build:
      context: .
      dockerfile: Dockerfile.single
    container_name: obsidian-panel-all-in-one
    ports:
      - "3000:3000" # Gateway HTTP/WebSocket port
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=obsidian_panel
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - obsidian_network
    restart: unless-stopped
    volumes:
      # Optional: view logs from host
      - ./logs:/var/log/supervisor
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/control/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB (still separate - recommended)
  mongodb:
    image: mongo:7
    container_name: obsidian-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - obsidian_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:


networks:
  obsidian_network:
    driver: bridge
